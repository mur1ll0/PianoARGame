project_name: piano_detector_candidateB_seg
model: yolov8n-seg.pt
imgsz: 640
epochs: 300
batch: 16
device: 0
workers: 8
patience: 80
seed: 42

augment:
  optimizer: AdamW
  lr0: 0.003
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 5.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  close_mosaic: 20
  cos_lr: true
  single_cls: true
  overlap_mask: true
  mask_ratio: 4
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 3.0
  translate: 0.08
  scale: 0.35
  shear: 0.0
  perspective: 0.0005
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.1

val:
  conf: 0.001
  iou: 0.7
  max_det: 300

export:
  format: onnx
  imgsz: 640
  opset: 12
  simplify: true
  dynamic: false
  nms: false
  half: false
