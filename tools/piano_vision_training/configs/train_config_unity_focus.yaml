project_name: piano_detector_candidateB_seg_unity_focus
model: yolov8s-seg.pt
imgsz: 640
epochs: 120
batch: 8
device: 0
workers: 8
patience: 35
seed: 42

augment:
  optimizer: SGD
  lr0: 0.005
  lrf: 0.05
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  close_mosaic: 10
  cos_lr: false
  single_cls: true
  overlap_mask: true
  mask_ratio: 4
  hsv_h: 0.01
  hsv_s: 0.5
  hsv_v: 0.3
  degrees: 2.0
  translate: 0.03
  scale: 0.15
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 0.2
  mixup: 0.0
  copy_paste: 0.0

val:
  conf: 0.001
  iou: 0.7
  max_det: 300

export:
  format: onnx
  imgsz: 640
  opset: 12
  simplify: true
  dynamic: false
  nms: false
  half: false
